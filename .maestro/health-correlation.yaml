# Maestro E2E flow — Health correlation reveal (v1.1, file 32).
#
# Mock user has 6 weeks of scans plus seeded HealthKit snapshots.
# The correlation card appears on dashboard slot 4 once a |R| ≥ 0.4
# pairing is found.
appId: com.velapp.vela
---
- launchApp:
    arguments:
      USE_MOCK_AR: "true"
      USE_MOCK_USER: "true_with_health_history"
      MOCK_HEALTH_PERMISSION: "granted"

- assertVisible: "What I'm noticing"
- tapOn: "What I'm noticing"
- assertVisible: "When you slept under 6 hours"
  timeout: 5000

- tapOn: "Show me the data"
- assertVisible: "Pearson R"
