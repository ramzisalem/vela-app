# Maestro E2E flow — Pregnancy life-stage mode side effects (file 48).
# Verifies: tretinoin disappears from routine, aging band suppressed, streak auto-pause messaging.
appId: com.velapp.vela
---
- launchApp:
    arguments:
      USE_MOCK_USER: "true_with_baseline"
      FORCE_LIFE_STAGE: "pregnancy"

# Routine
- tapOn:
    id: "tab-routine"
- assertNotVisible: "Tretinoin"

# Dashboard
- tapOn:
    id: "tab-dashboard"
- assertVisible: "Pregnancy mode"
- assertNotVisible: "Aging band"

# Streak chip is paused
- assertVisible: "Auto-paused"
