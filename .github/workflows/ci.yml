name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.15.0'
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Brand voice check
        run: npx ts-node --transpile-only scripts/checkBrandVoice.ts
      - name: WCAG contrast check
        run: npx ts-node --transpile-only scripts/checkContrast.ts
      - name: Lint
        run: npx eslint . --ext .ts,.tsx --max-warnings 50
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test
        run: npx jest --ci --no-watchman --runInBand --passWithNoTests
