name: EAS Build

on:
  # Builds are manual or tag-only — not on every push to main.
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS profile (development/staging/production)'
        required: true
        default: 'staging'

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.profile || 'staging' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.15.0'
          cache: npm
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci --no-audit --no-fund
      - run: eas build --non-interactive --no-wait --platform ios --profile ${{ github.event.inputs.profile || 'staging' }}
